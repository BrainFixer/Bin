name: directory-listing
on: [push]
jobs:
  pages-directory-listing:
    runs-on: ubuntu-latest
    name: Directory Listings Index
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        # Убираем строку с ref: dummy-data, чтобы он брал текущую ветку (main)

      - name: Generate Directory Listings
        uses: jayanta525/github-pages-directory-listing@v4.0.0
        with:
          FOLDER: . # Укажите '.', если хотите листинг всего корня репозитория

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: '.' # Укажите '.', чтобы загрузить сгенерированные файлы

  deploy:
    needs: pages-directory-listing
    permissions:
      pages: write      # необходимо для деплоя
      id-token: write   # необходимо для проверки источника
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.0
